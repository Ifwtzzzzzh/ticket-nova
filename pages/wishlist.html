<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wishlist - TicketNova</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        background: #0f172a;
        color: white;
      }

      .card {
        background: #1e293b;
        border: none;
        color: white;
        transition: transform 0.2s;
      }

      .card:hover {
        transform: translateY(-2px);
      }

      .navbar {
        background: #020617;
      }
    </style>
  </head>
  <body class="min-vh-100 d-flex flex-column">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../index.html"> 🎫 TicketNova </a>
        <div class="ms-auto">
          <a href="../index.html" class="btn btn-outline-light btn-sm">
            Home
          </a>
          <a href="events.html" class="btn btn-outline-light btn-sm">
            Events
          </a>
          <a href="dashboard.html" class="btn btn-outline-light btn-sm">
            Dashboard
          </a>
        </div>
      </div>
    </nav>

    <div class="modal fade" id="bookingModal">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-white border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title">Booking Tiket (via Wishlist)</h5>
            <button
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="eventName" />
            <label class="form-label">Jenis Tiket</label>
            <select
              class="form-control mb-3 bg-secondary text-white border-0"
              id="ticketType"
            >
              <option value="VIP">VIP</option>
              <option value="Festival">Festival</option>
              <option value="Regular">Regular</option>
            </select>
            <label class="form-label">Jumlah Tiket</label>
            <input
              type="number"
              class="form-control bg-secondary text-white border-0"
              id="ticketQty"
              value="1"
              min="1"
            />
          </div>
          <div class="modal-footer border-secondary">
            <button class="btn btn-success px-4" id="confirmBook">
              Konfirmasi Booking
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="container py-4 flex-grow-1">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>❤️ My Wishlist</h2>
        <button
          id="clearAllWishlist"
          class="btn btn-outline-danger btn-sm d-none"
        >
          <i class="fa-solid fa-trash-can me-1"></i> Bersihkan Semua
        </button>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div
            class="alert alert-warning bg-warning bg-opacity-10 text-warning border-warning border-opacity-25 mb-0"
          >
            ❤️ Total Item Tersimpan: <strong id="wishCount">0</strong>
          </div>
        </div>
      </div>

      <div class="row g-3" id="wishlistContainer"></div>
    </div>

    <footer
      class="text-center py-3 border-top border-secondary border-opacity-25 mt-auto"
      style="background: #020617"
    >
      <p class="text-light small mb-0">
        &copy; 2026 TicketNova. Tugas Kuliah Web Developer.
      </p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      $(document).ready(function () {
        let selectedEvent = "";

        function loadWishlist() {
          let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
          let container = $("#wishlistContainer");
          $("#wishCount").text(wishlist.length);
          container.empty();
          if (wishlist.length === 0) {
            $("#clearAllWishlist").addClass("d-none");
            container.html(`
                        <div class="col-12 text-center py-5">
                            <div class="text-light mb-3">
                                <i class="fa-regular fa-heart fa-3x"></i>
                            </div>
                            <h5 class="text-light">Wishlist kamu masih kosong, brother.</h5>
                            <p class="text-light small">Jelajahi event seru dan simpan tiket incaranmu di sini.</p>
                            <a href="events.html" class="btn btn-primary btn-sm mt-2">Lihat Events</a>
                        </div>
                    `);
            return;
          }

          $("#clearAllWishlist").removeClass("d-none");
          wishlist.forEach((item, index) => {
            let namaEvent =
              typeof item === "object" ? item.name || item.event : item;
            let tipeEvent =
              typeof item === "object"
                ? item.type || "General Admission"
                : "Pemesanan Online";
            let waktuEvent =
              typeof item === "object"
                ? item.date || item.time || "2026"
                : "2026";
            container.append(`
                        <div class="col-md-4">
                            <div class="card p-3 h-100">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <span class="badge bg-primary mb-2">${tipeEvent}</span>
                                        <h5 class="fw-bold mb-1">${namaEvent}</h5>
                                        <p class="text-muted small mb-0"><i class="fa-regular fa-clock me-1"></i> ${waktuEvent}</p>
                                    </div>
                                    <button class="btn btn-outline-danger btn-sm border-0 btn-delete-wish" data-index="${index}">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <div class="mt-3 pt-2 border-top border-secondary border-opacity-50 d-flex gap-2">
                                    <button class="btn btn-warning btn-sm w-100 fw-semibold btn-pesan-cepat">
                                        Pesan Sekarang
                                    </button>
                                </div>
                            </div>
                        </div>
                    `);
          });
        }
        loadWishlist();

        $(document).on("click", ".btn-delete-wish", function () {
          let index = $(this).data("index");
          let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
          wishlist.splice(index, 1);
          localStorage.setItem("wishlist", JSON.stringify(wishlist));
          loadWishlist();
        });

        $("#clearAllWishlist").on("click", function () {
          if (confirm("Kamu yakin mau membersihkan semua daftar wishlist?")) {
            localStorage.removeItem("wishlist");
            loadWishlist();
          }
        });
        $(document).on("click", ".btn-pesan-cepat", function () {
          selectedEvent = $(this).closest(".card").find("h5").text();
          $("#eventName").val(selectedEvent);
          let myModal = new bootstrap.Modal(
            document.getElementById("bookingModal"),
          );
          myModal.show();
        });
        $("#confirmBook").click(function () {
          let ticketType = $("#ticketType").val();
          let ticketQty = $("#ticketQty").val();
          let hargaSatuan = 500000;
          if (ticketType === "VIP") hargaSatuan = 1500000;
          if (ticketType === "Festival") hargaSatuan = 900000;
          let ticket = {
            event: selectedEvent,
            type: ticketType,
            qty: ticketQty,
            hargaSatuan: hargaSatuan,
            time: new Date().toLocaleString(),
          };
          localStorage.setItem("currentBooking", JSON.stringify(ticket));
          localStorage.setItem("activeBooking", JSON.stringify(ticket));
          window.location.href = "payment.html";
        });
      });
    </script>
  </body>
</html>
