<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran - TicketNova</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    color:white;
    border:none;
}

.invoice-box{
    background:#334155;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a class="navbar-brand fw-bold">
🎫 TicketNova
</a>

<a
href="events.html"
class="btn btn-outline-light">

← Kembali

</a>

</div>

</nav>

<div class="container py-5">

<h2 class="mb-4">
💳 Pembayaran Tiket
</h2>

<div class="row">

<div class="col-md-8">

<div class="card p-4">

<h4 id="eventTitle">
Event
</h4>

<hr>

<p>
🎟 Jenis Tiket :
<span id="ticketType"></span>
</p>

<p>
👥 Jumlah :
<span id="ticketQty"></span>
</p>

<p>
📅 Tanggal Pesan :
<span id="orderDate"></span>
</p>

<div class="invoice-box mt-3">

<h5>Ringkasan Pembayaran</h5>

<p>
Harga Tiket :
Rp <span id="ticketPrice">500000</span>
</p>

<p>
Pajak (5%) :
Rp <span id="tax">0</span>
</p>

<p>
Biaya Layanan :
Rp <span id="serviceFee">10000</span>
</p>

<hr>

<h4>
Total :
Rp <span id="totalPrice"></span>
</h4>

</div>

<label class="mt-4">
Metode Pembayaran
</label>

<select
class="form-select my-3"
id="paymentMethod">

<option>Transfer Bank</option>

<option>E-Wallet</option>

<option>QRIS</option>

<option>Virtual Account</option>

</select>

<div
class="alert alert-info"
id="paymentInfo">

Pilih metode pembayaran

</div>

<button
class="btn btn-success w-100"
id="payNow">

Bayar Sekarang

</button>

</div>

</div>

<div class="col-md-4">

<div class="card p-4">

<h5>📄 Invoice</h5>

<p>
Invoice ID :
<span id="invoiceId"></span>
</p>

<p>
Status :
<span class="badge bg-warning">
Pending
</span>
</p>

<p>
Reward :
+100 Point
</p>

</div>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

let booking =
JSON.parse(
localStorage.getItem("currentBooking")
);

if(!booking){

alert("Tidak ada data booking!");

window.location.href =
"events.html";

}

$("#eventTitle").text(
booking.event
);

$("#ticketType").text(
booking.type
);

$("#ticketQty").text(
booking.qty
);

$("#orderDate").text(
new Date().toLocaleString()
);

let price = 500000;

if(booking.type === "VIP"){
price = 1000000;
}

if(booking.type === "Festival"){
price = 750000;
}

let qty =
parseInt(booking.qty);

let subtotal =
price * qty;

let tax =
subtotal * 0.05;

let serviceFee =
10000;

let total =
subtotal + tax + serviceFee;

$("#ticketPrice").text(
subtotal.toLocaleString()
);

$("#tax").text(
tax.toLocaleString()
);

$("#totalPrice").text(
total.toLocaleString()
);

let invoice =
"INV-" +
Math.floor(
Math.random()*999999
);

$("#invoiceId").text(
invoice
);

$("#paymentMethod").change(function(){

let method =
$(this).val();

let info = "";

if(method === "Transfer Bank"){

info =
"Transfer ke BCA 1234567890";

}

if(method === "E-Wallet"){

info =
"DANA / OVO / GoPay";

}

if(method === "QRIS"){

info =
"Scan QRIS saat pembayaran";

}

if(method === "Virtual Account"){

info =
"VA BNI 888999777";

}

$("#paymentInfo").text(info);

});

$("#payNow").click(function(){

let tickets =
JSON.parse(
localStorage.getItem("tickets")
) || [];

booking.invoice = invoice;

booking.total = total;

booking.status = "Paid";

booking.payment =
$("#paymentMethod").val();

tickets.push(booking);

localStorage.setItem(
"tickets",
JSON.stringify(tickets)
);

let points =
parseInt(
localStorage.getItem("points")
) || 0;

points += 100;

localStorage.setItem(
"points",
points
);

alert(
"🎉 Pembayaran Berhasil!"
);

window.location.href =
"dashboard.html";

});

</script>

</body>

</html>
