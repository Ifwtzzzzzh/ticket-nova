<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - TicketNova</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(
    135deg,
    #0f172a,
    #1e293b
    );
    min-height:100vh;
}

.register-card{
    background:#1e293b;
    color:white;
    border:none;
    border-radius:20px;
}

.logo{
    font-size:50px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">
🎫 TicketNova
</a>

<a
href="index.html"
class="btn btn-outline-light">

Home

</a>

</div>

</nav>

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-md-6">

<div class="card register-card p-4 shadow-lg">

<div class="text-center mb-3">

<div class="logo">
🎫
</div>

<h2 class="fw-bold">
Register TicketNova
</h2>

<p class="text-secondary">
Buat akun untuk mulai memesan tiket
</p>

</div>

<input
id="fullname"
class="form-control my-2"
placeholder="Nama Lengkap">

<input
id="username"
class="form-control my-2"
placeholder="Username">

<input
id="email"
type="email"
class="form-control my-2"
placeholder="Email">

<div class="input-group my-2">

<input
id="password"
type="password"
class="form-control"
placeholder="Password">

<button
class="btn btn-outline-secondary"
id="showPassword">

👁

</button>

</div>

<input
id="confirmPassword"
type="password"
class="form-control my-2"
placeholder="Konfirmasi Password">

<button
class="btn btn-success w-100 mt-2"
id="registerBtn">

Register

</button>

<div class="text-center mt-3">

Sudah punya akun?

<a
href="login.html"
class="text-info">

Login

</a>

</div>

</div>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

$("#showPassword").click(function(){

let pass =
$("#password");

if(pass.attr("type") === "password"){

pass.attr("type","text");

}else{

pass.attr("type","password");

}

});

$("#registerBtn").click(function(){

let fullname =
$("#fullname").val();

let username =
$("#username").val();

let email =
$("#email").val();

let password =
$("#password").val();

let confirmPassword =
$("#confirmPassword").val();

if(
fullname === "" ||
username === "" ||
email === "" ||
password === "" ||
confirmPassword === ""
){

alert("Semua field wajib diisi!");

return;

}

if(password !== confirmPassword){

alert("Password tidak sama!");

return;

}

let oldUser =
JSON.parse(
localStorage.getItem("user")
);

if(oldUser && oldUser.email === email){

alert("Email sudah terdaftar!");

return;

}

let user = {

fullname:fullname,
username:username,
email:email,
password:password,
points:0,
badge:"Bronze Fan"

};

localStorage.setItem(
"user",
JSON.stringify(user)
);

alert(
"✅ Registrasi Berhasil!"
);

window.location.href =
"login.html";

});

</script>

</body>

</html>
